name: CI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/api/Todo.Api.sln

      - name: Build
        run: dotnet build src/api/Todo.Api.sln --no-restore --configuration Release

      - name: Lint (format check)
        run: dotnet format src/api/Todo.Api.sln --verify-no-changes --verbosity normal

      - name: Run unit tests
        run: dotnet test src/api/Todo.Api.sln --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish src/api/Todo.Api.csproj --no-restore --no-build --configuration Release --output ./publish/api

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: ./publish/api

  frontend:
    name: Build and Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/web

      - name: Lint
        run: npm run lint
        working-directory: src/web

      - name: Build
        run: npm run build
        working-directory: src/web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: src/web/dist

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      # Set REACT_APP_WEB_BASE_URL as a repository variable to point Playwright
      # at a deployed environment. If not set, tests run against a local stack
      # backed by the Azure Cosmos DB emulator.
      REACT_APP_WEB_BASE_URL: ${{ vars.REACT_APP_WEB_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Setup .NET
        if: vars.REACT_APP_WEB_BASE_URL == ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download backend artifact
        if: vars.REACT_APP_WEB_BASE_URL == ''
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: ./publish/api

      - name: Download frontend artifact
        if: vars.REACT_APP_WEB_BASE_URL == ''
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: ./publish/web

      - name: Start Cosmos DB Emulator
        if: vars.REACT_APP_WEB_BASE_URL == ''
        run: |
          docker run -d \
            --name cosmos-emulator \
            -p 8081:8081 \
            -p 10251-10255:10251-10255 \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest

      - name: Wait for Cosmos DB Emulator
        if: vars.REACT_APP_WEB_BASE_URL == ''
        run: |
          echo "Waiting for Cosmos DB emulator to accept authenticated requests..."
          # Poll until a real authenticated GET /dbs request succeeds (HTTP 200).
          # This is the only reliable signal that the emulator is fully ready,
          # because the cert/HTTP endpoint becomes available well before the
          # auth system is initialized.
          python3 << 'PYEOF'
          import hmac, hashlib, base64, urllib.request, ssl, email.utils, urllib.parse, time, sys

          KEY = base64.b64decode("C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b6m4TLI3Te1lclOcGcmgm6M2Yw==")

          def make_auth(date_str):
              payload = f"get\ndbs\n\n{date_str.lower()}\n\n"
              sig = base64.b64encode(hmac.new(KEY, payload.encode(), hashlib.sha256).digest()).decode()
              return "type%3dmaster%26ver%3d1.0%26sig%3d" + urllib.parse.quote(sig)

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          for i in range(36):  # up to 180 seconds
              try:
                  date_str = email.utils.formatdate(usegmt=True)
                  req = urllib.request.Request(
                      "https://localhost:8081/dbs",
                      headers={"Authorization": make_auth(date_str), "x-ms-date": date_str, "x-ms-version": "2018-12-31"}
                  )
                  with urllib.request.urlopen(req, context=ctx) as r:
                      print(f"Cosmos DB emulator is ready (HTTP {r.status})")
                      sys.exit(0)
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")[:120]
                  print(f"Attempt {i+1}/36: HTTP {e.code} - {body}")
              except Exception as e:
                  print(f"Attempt {i+1}/36: {type(e).__name__}: {e}")
              time.sleep(5)

          print("ERROR: Cosmos DB emulator did not become ready in 180 s")
          print("Docker logs:")
          import subprocess
          subprocess.run(["docker", "logs", "--tail", "50", "cosmos-emulator"])
          sys.exit(1)
          PYEOF

      - name: Start backend API
        if: vars.REACT_APP_WEB_BASE_URL == ''
        # Redirect output to a file so the process is not killed by SIGPIPE when
        # GitHub Actions closes the step's output pipe after the shell exits.
        run: dotnet ./publish/api/Todo.Api.dll > /tmp/api.log 2>&1 &
        env:
          ASPNETCORE_URLS: http://localhost:3100
          AZURE_COSMOS_ENDPOINT: https://localhost:8081
          AZURE_COSMOS_DATABASE_NAME: restoplan
          # Well-known public key for the Azure Cosmos DB emulator - not a secret
          AZURE_COSMOS_KEY: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b6m4TLI3Te1lclOcGcmgm6M2Yw==

      - name: Serve frontend
        if: vars.REACT_APP_WEB_BASE_URL == ''
        run: npx serve@latest -l 3000 -s ./publish/web > /tmp/web.log 2>&1 &

      - name: Wait for services to be ready
        if: vars.REACT_APP_WEB_BASE_URL == ''
        run: |
          echo "Waiting for backend API (tailing /tmp/api.log for diagnostics)..."
          timeout 120 bash -c 'until curl -s http://localhost:3100/lists > /dev/null 2>&1; do sleep 2; done' || \
            { echo "Backend did not start. Last log:"; tail -50 /tmp/api.log; exit 1; }
          echo "Waiting for frontend..."
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          echo "All services ready"

      - name: Install dependencies
        run: npm ci
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
