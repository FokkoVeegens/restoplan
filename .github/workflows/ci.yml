name: CI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/api/Todo.Api.sln

      - name: Build
        run: dotnet build src/api/Todo.Api.sln --no-restore --configuration Release

      - name: Lint (format check)
        run: dotnet format src/api/Todo.Api.sln --verify-no-changes --verbosity normal

      - name: Run unit tests
        run: dotnet test src/api/Todo.Api.sln --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish src/api/Todo.Api.csproj --no-restore --no-build --configuration Release --output ./publish/api

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: ./publish/api

  frontend:
    name: Build and Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/web

      - name: Lint
        run: npm run lint
        working-directory: src/web

      - name: Build
        run: npm run build
        working-directory: src/web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: src/web/dist

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    env:
      # Set REACT_APP_WEB_BASE_URL as a repository variable to point Playwright
      # at a deployed environment. Defaults to http://localhost:3000 if not set.
      REACT_APP_WEB_BASE_URL: ${{ vars.REACT_APP_WEB_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
